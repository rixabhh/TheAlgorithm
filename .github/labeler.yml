frontend:
- any:
  - changed-files:
    - any-glob-to-any-file:
      - 'static/css/**/*'
      - 'static/js/**/*'
      - '*.html'

backend:
- any:
  - changed-files:
    - any-glob-to-any-file:
      - 'app.py'
      - 'functions/**/*'
      - 'tests/**/*'

infrastructure:
- any:
  - changed-files:
    - any-glob-to-any-file:
      - 'Dockerfile'
      - 'Makefile'
      - 'requirements.txt'
      - 'pyproject.toml'
      - '.github/**/*'
      - '.pre-commit-config.yaml'

documentation:
- any:
  - changed-files:
    - any-glob-to-any-file:
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'issue-*.md'
      - '.jules/**/*'
