frontend:
  - any:
    - changed-files:
      - any-glob-to-any-file: 'static/**/*'
    - changed-files:
      - any-glob-to-any-file: '**/*.html'

backend:
  - any:
    - changed-files:
      - any-glob-to-any-file: 'functions/**/*'
    - changed-files:
      - any-glob-to-any-file: 'app.py'

infra:
  - any:
    - changed-files:
      - any-glob-to-any-file: 'Dockerfile'
    - changed-files:
      - any-glob-to-any-file: '.github/**/*'
    - changed-files:
      - any-glob-to-any-file: 'requirements.txt'
    - changed-files:
      - any-glob-to-any-file: 'pyproject.toml'
    - changed-files:
      - any-glob-to-any-file: 'Makefile'

docs:
  - any:
    - changed-files:
      - any-glob-to-any-file: '**/*.md'
