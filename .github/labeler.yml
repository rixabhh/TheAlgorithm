frontend:
- changed-files:
  - any-glob-to-any-file:
    - static/css/**/*
    - static/js/**/*
    - '*.html'

backend:
- changed-files:
  - any-glob-to-any-file:
    - app.py
    - functions/**/*
    - tests/**/*

infrastructure:
- changed-files:
  - any-glob-to-any-file:
    - Dockerfile
    - Makefile
    - requirements.txt
    - pyproject.toml
    - .github/**/*
    - .pre-commit-config.yaml

documentation:
- changed-files:
  - any-glob-to-any-file:
    - README.md
    - CONTRIBUTING.md
    - issue-*.md
    - .jules/**/*
