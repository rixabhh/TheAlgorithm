<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shared Report — The Algorithm</title>

    <meta property="og:title" content="The Algorithm — AI Relationship Analyzer" />
    <meta property="og:description" content="Check out my brutally honest relationship breakdown." />
    <meta property="og:image" content="/static/og-image.png" />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="The Algorithm" />
    <meta name="twitter:description" content="Check out my brutally honest relationship breakdown." />
    <meta name="twitter:image" content="/static/og-image.png" />

    <link rel="stylesheet" href="static/css/style.css">
    <link rel="icon" type="image/png" href="static/favicon.png">
</head>
<body class="comic-dots" style="min-height: 100vh; display: flex; flex-direction: column; background: var(--cream);">

    <header class="nav">
        <div class="container">
            <a href="/" class="nav-logo">
                <span style="font-size:1.3rem;line-height:1;letter-spacing:-0.03em">The Algorithm</span>
                <span style="font-size:.55rem;font-family:var(--font-body);font-weight:500;color:var(--gray-400);font-style:italic;letter-spacing:0.02em;text-transform:none">decode your chats</span>
            </a>
        </div>
    </header>

    <main class="container" style="flex: 1; padding: 4rem 1rem; display: flex; flex-direction: column; align-items: center; max-width: 800px;">
        <div id="loading" style="font-size: 1.5rem; font-weight: 900; margin-bottom: 2rem;">Loading Shared Report...</div>
        <div id="error" class="hidden text-center" style="margin-bottom: 2rem; color: var(--red); font-weight: 700;"></div>

        <div id="share-card-container" class="hidden" style="width: 100%; display: flex; flex-direction: column; gap: 2rem;">
            <!-- Displayed Card -->
            <div style="background:#FFF8F0;padding:2rem;border:6px solid #000;box-shadow:12px 12px 0 #000;">
                <div style="background:#000;color:#fff;padding:0.5rem 1rem;font-weight:900;font-size:1rem;display:inline-block;margin-bottom:1rem;" id="ui-label">--</div>
                <h1 id="ui-title" style="font-size:3rem;line-height:1;margin:0;font-weight:900;letter-spacing:-0.04em;margin-bottom:0.5rem">--</h1>
                <p style="font-size:1.2rem;color:#666;margin-bottom:2rem;font-weight:700;">Between <span id="ui-me">--</span> & <span id="ui-partner">--</span></p>

                <div class="grid grid-2 gap-4 mb-6" style="grid-template-columns: 1fr 1fr;">
                    <div style="background:#fff;border:4px solid #000;padding:1.5rem;box-shadow:6px 6px 0 #000">
                        <p style="text-transform:uppercase;font-weight:900;font-size:0.8rem;color:#FF4081;margin-bottom:0.5rem">Total Messages</p>
                        <h2 id="ui-total" style="font-size:2rem;margin:0;font-weight:900">--</h2>
                    </div>
                    <div style="background:#fff;border:4px solid #000;padding:1.5rem;box-shadow:6px 6px 0 #000">
                        <p style="text-transform:uppercase;font-weight:900;font-size:0.8rem;color:#7C4DFF;margin-bottom:0.5rem">Duration</p>
                        <h2 id="ui-duration" style="font-size:2rem;margin:0;font-weight:900">--</h2>
                    </div>
                </div>

                <div style="background:#fff;border:4px solid #000;padding:1.5rem;box-shadow:6px 6px 0 #000;margin-bottom:1.5rem;">
                    <p style="text-transform:uppercase;font-weight:900;font-size:0.8rem;margin-bottom:1rem">Message Share</p>
                    <div style="height:30px;background:#eee;border:2px solid #000;display:flex;overflow:hidden">
                        <div id="ui-bar-me" style="background:#000;width:50%"></div>
                        <div id="ui-bar-partner" style="background:#FF4081;width:50%"></div>
                    </div>
                </div>

                <div class="grid grid-2 gap-4 mb-6" style="grid-template-columns: 1fr 1fr;">
                    <div style="background:#ffcccc;border:4px solid #000;padding:1.5rem;box-shadow:6px 6px 0 #000">
                        <p style="text-transform:uppercase;font-weight:900;font-size:0.8rem;margin-bottom:1rem">🚩 Red Flag</p>
                        <p id="ui-red" style="font-size:1rem;font-weight:700;line-height:1.4">--</p>
                    </div>
                    <div style="background:#ccffcc;border:4px solid #000;padding:1.5rem;box-shadow:6px 6px 0 #000">
                        <p style="text-transform:uppercase;font-weight:900;font-size:0.8rem;margin-bottom:1rem">✅ Green Flag</p>
                        <p id="ui-green" style="font-size:1rem;font-weight:700;line-height:1.4">--</p>
                    </div>
                </div>

                <div style="background:#000;color:#fff;padding:2rem;border-radius:12px;text-align:center">
                    <p style="text-transform:uppercase;font-weight:900;font-size:0.8rem;color:#FFD600;margin-bottom:1rem">The Final Word</p>
                    <blockquote id="ui-verdict" style="font-size:1.5rem;font-weight:900;line-height:1.3;margin:0;font-style:italic">"..."</blockquote>
                </div>
            </div>

            <div class="text-center">
                <a href="/" class="btn btn--pink btn--lg" style="font-size: 1.2rem; padding: 1rem 3rem;">Analyse Your Own Chat</a>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const hash = window.location.hash.substring(1);
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const container = document.getElementById('share-card-container');

            if (!hash) {
                loading.classList.add('hidden');
                error.textContent = "Invalid share link. No data found.";
                error.classList.remove('hidden');
                return;
            }

            try {
                // Decode base64 to string, then parse JSON
                const decodedStr = decodeURIComponent(atob(hash));
                const data = JSON.parse(decodedStr);

                document.getElementById('ui-title').textContent = data.title || "Analysis";
                document.getElementById('ui-label').textContent = data.style || "VIBE STATUS";
                document.getElementById('ui-me').textContent = data.my_name || "Person 1";
                document.getElementById('ui-partner').textContent = data.partner_name || "Person 2";

                document.getElementById('ui-total').textContent = (data.total_messages || 0).toLocaleString();
                document.getElementById('ui-duration').textContent = data.duration || '--';

                document.getElementById('ui-red').textContent = data.red_flag || '--';
                document.getElementById('ui-green').textContent = data.green_flag || '--';
                document.getElementById('ui-verdict').textContent = `"${data.verdict || 'The vibe is set.'}"`;

                const mePct = data.me_pct || 50;
                document.getElementById('ui-bar-me').style.width = mePct + '%';
                document.getElementById('ui-bar-partner').style.width = (100 - mePct) + '%';

                loading.classList.add('hidden');
                container.classList.remove('hidden');

            } catch (err) {
                console.error("Failed to decode share data", err);
                loading.classList.add('hidden');
                error.textContent = "This share link is broken or malformed.";
                error.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
